name: Release

# Triggered by pushing a version tag (e.g. v0.2.0).
# Runs the full pre-publish gate, publishes to npm with provenance
# (skipping if that version already exists), then creates a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance / OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Lint package
        run: pnpm run lint:pkg

      - name: Resolve package name/version and check npm
        id: check
        run: |
          NAME=$(pnpm pkg get name | tr -d '"')
          VERSION=$(pnpm pkg get version | tr -d '"')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already published on npm - skipping publish step."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Uses npm Trusted Publishing (OIDC, no automation token).
      # This repository + workflow must be configured as a trusted publisher at npmjs.com.
      # NOTE: --provenance requires this repository to be PUBLIC.
      #
      # OIDC trusted publishing is an npm CLI feature (>= 11.5.1); neither pnpm nor the
      # runner's bundled npm 10.x perform the OIDC token exchange (they fail with E404),
      # so upgrade npm and publish with it.
      - name: Upgrade npm for OIDC trusted publishing
        if: steps.check.outputs.exists == 'false'
        run: npm install -g npm@latest

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
